<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Монитор -->
  <g>
    <!-- Корпус на монитора -->
    <rect x="50" y="58" width="156" height="106" rx="12" ry="12" fill="#111111"/>
    <!-- Стойка -->
    <path d="M110 164 L146 164 L152 178 L104 178 Z" fill="#111111"/>
    <!-- Основа на стойката -->
    <path d="M82 178 L174 178 L182 188 L74 188 Z" fill="#111111"/>

    <!-- Екран -->
    <rect x="60" y="68" width="136" height="86" rx="6" fill="#0b0f14"/>

    <!-- Заглавна лента на терминала -->
    <path d="M60 74 a6 6 0 0 1 6 -6 h124 a6 6 0 0 1 6 6 v10 h-136 z" fill="#1c232b"/>
    <circle cx="71" cy="79" r="3" fill="#ff5f56"/>
    <circle cx="81" cy="79" r="3" fill="#ffbd2e"/>
    <circle cx="91" cy="79" r="3" fill="#27c93f"/>

    <!-- Конзолен текст: разчупени "редове код" с различна дължина, наклон и цветове -->
    <g font-family="Menlo, Consolas, monospace" font-size="9" fill="#22d3ee">
      <text x="68" y="98">$ <tspan fill="#e2e8f0">init --sync</tspan></text>
    </g>
    <g font-family="Menlo, Consolas, monospace" font-size="9">
      <text x="76" y="110" fill="#38bdf8">const</text>
      <text x="106" y="110" fill="#e2e8f0">data</text>
      <text x="130" y="110" fill="#94a3b8">=</text>
      <text x="138" y="110" fill="#fbbf24">fetch()</text>

      <text x="76" y="122" fill="#c084fc">if</text>
      <text x="88" y="122" fill="#e2e8f0">(ok)</text>
      <text x="112" y="122" fill="#34d399">render();</text>

      <text x="76" y="134" fill="#94a3b8">//</text>
      <text x="90" y="134" fill="#64748b">done ✓</text>
    </g>

  </g>
</svg>
